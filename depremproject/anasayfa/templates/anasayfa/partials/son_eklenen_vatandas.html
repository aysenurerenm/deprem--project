

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Ad Soyad</th>
            <th>Yaş</th>
            <th>Cinsiyet</th>
            <th>TC Kimlik No</th>
            <th>Telefon</th>
            <th>Durum</th>
        </tr>
    </thead>
    <tbody>
        {% for kisi in kisiler %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ kisi.ad_soyad }}</td>
                <td>{{ kisi.yas }}</td>
               <td>
                    {% if kisi.cinsiyet %}
                        Erkek
                    {% else %}
                        Kadın
                    {% endif %}
                </td>
                <td>{{ kisi.tc }}</td>
                <td>{{ kisi.telefon }}</td>
                <td>{{ kisi.durum }}</td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="6" class="text-center">Henüz kayıt yok.</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
